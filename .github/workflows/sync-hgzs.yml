name: 同步hgzs规则

on:
  schedule:
    - cron: '0 2 * * *'          # 每天凌晨2点自动运行（你可以调整这一行的时间）
  workflow_dispatch:             # 支持手动触发

jobs:
  sync-hgzs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 安装依赖
        run: pip install requests chardet

      - name: 同步文件并统计AdGuard规则
        run: |
          python -c '
          import requests
          import chardet
          import re
          from datetime import datetime, timezone, timedelta
          import time

          file_urls = [
              ("http://hgzs.uunat.com/hg.txt", "hg.txt"),
              ("http://hgzs.uunat.com/hg1.txt", "hg1.txt"),
              ("http://hgzs.uunat.com/hg2.txt", "hg2.txt"),
              ("http://hgzs.uunat.com/yx.txt", "yx.txt")
          ]

          success_count = 0

          def is_adguard_rule(line):
              line = line.strip()
              if not line or line.startswith(("!", "#", "[")):
                  return False
              return any(x in line for x in ["||", "|", "@@", "$", "/"])

          beijing_tz = timezone(timedelta(hours=8))
          update_time = datetime.now(beijing_tz).strftime("%Y-%m-%d %H:%M:%S")

          session = requests.Session()

          # 模拟真实浏览器的请求头
          session.headers.update({
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/plain,text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8",
              "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.8",
              "Accept-Encoding": "gzip, deflate",
              "Connection": "keep-alive",
              "Cache-Control": "max-age=0",
              "Upgrade-Insecure-Requests": "1"
          })

          for url, save_path in file_urls:
              try:
                  print(f"正在下载: {url}")
                  # 添加延迟避免请求过快
                  time.sleep(1)

                  response = session.get(url, timeout=30, allow_redirects=True)

                  if response.status_code == 409:
                      print(f"⚠ 服务器返回409，尝试使用备用方法...")
                      # 尝试不使用session，直接用requests
                      response = requests.get(url, timeout=30, headers={
                          "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
                      })

                  response.raise_for_status()

                  encoding = chardet.detect(response.content)["encoding"] or "utf-8"
                  content = response.content.decode(encoding)

                  lines = content.splitlines()
                  filtered_lines = [
                      line for line in lines 
                      if not (line.strip().startswith("! Version:") or 
                              line.strip().startswith("! Total count:"))
                  ]

                  adguard_count = sum(1 for line in filtered_lines is_adguard_rule(line))

                  header = [
                      f"! Version:    # 最后同步时间: {update_time} (北京时间)",
                      f"! Total count: {adguard_count} (仅统计AdGuard规则)"
                  ]

                  new_content = "\n".join(header + filtered_lines)

                  with open(save_path, "w", encoding="utf-8") as f:
                      f.write(new_content)

                  print(f"✓ 成功同步 {save_path} (规则数: {adguard_count})")
                  success_count += 1

              except Exception as e:
                  print(f"✗ 同步 {url} 失败: {str(e)}")

          if success_count == 0:
              print("\n所有文件同步失败！")
              print("可能原因：")
              print("1. 目标服务器禁止GitHub Actions IP访问")
              print("2. 服务器需要特殊认证")
              print("3. 网络连接问题")
              exit(1)

          print(f"\n同步完成: 成功 {success_count}/{len(file_urls)} 个文件")
          '